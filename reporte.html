<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Reporte de Materia Prima</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">Inventario</a>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">Salir</a>
                <a href="inventario.html" class="nav-item">Inventario</a>
                <a href="produccion.html" class="nav-item">Producción</a>
                <a href="usuarios.html" class="nav-item">Usuarios</a>
                <a href="reporte.html" class="nav-item active">Reporte</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Reporte de Materia Prima Utilizada</h2>
            <p>Seleccione el año y el mes para ver el código, nombre y cantidad consumida de cada materia prima en las producciones realizadas.</p>

            <form id="form-reporte" class="producto-form-produccion">
                <div class="grupo-produccion">
                    <label for="select-anio">Año:</label>
                    <select id="select-anio" required></select>
                </div>

                <div class="grupo-produccion">
                    <label for="select-mes">Mes:</label>
                    <select id="select-mes" required>
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                </div>

                <button type="submit" class="btn-producir">
                    Generar Reporte
                </button>
            </form>
        </div>

        <div class="card">
            <h2>Consumo de Materia Prima</h2>
            <p>Resultados del período seleccionado.</p>

            <div id="contenedor-tabla-reporte"></div>
        </div>
    </div>

    <script src="reporte.js"></script>
</body>
</html>
